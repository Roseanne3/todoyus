<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#0d0d1a"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>MoodBar</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700;800&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d0d1a;--surface:#13131f;--card:#1a1a2e;--card2:#1e1e35;
  --accent:#f6c90e;--accent2:#ff6b9d;--accent3:#00d4aa;
  --text:#f0f0f8;--sub:#8888aa;--border:#2a2a45;
  --danger:#ff4757;--success:#2ed573;
  --font:'Prompt',sans-serif;--font2:'Sarabun',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden}
#app{position:relative;height:100%;display:flex;flex-direction:column}
.screen{display:none;flex:1;flex-direction:column;overflow:hidden}
.screen.active{display:flex}
#auth-screen{justify-content:center;align-items:center;padding:24px;background:radial-gradient(ellipse at 50% 0%,#1a1a3e 0%,var(--bg) 70%);overflow-y:auto}
.auth-logo{font-size:52px;margin-bottom:8px;animation:float 3s ease-in-out infinite;text-align:center}
.auth-title{font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;text-align:center}
.auth-sub{color:var(--sub);font-size:13px;margin-bottom:32px;font-family:var(--font2);text-align:center}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;width:100%;max-width:380px}
.auth-tabs{display:flex;background:var(--surface);border-radius:12px;padding:4px;margin-bottom:20px}
.auth-tab{flex:1;padding:10px;text-align:center;border-radius:9px;cursor:pointer;font-size:14px;font-weight:600;color:var(--sub);transition:.2s}
.auth-tab.active{background:var(--accent);color:#000}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--sub);margin-bottom:6px;font-family:var(--font2)}
.field input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:.2s}
.field input:focus{border-color:var(--accent)}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;transition:.2s}
.btn-primary{background:linear-gradient(135deg,var(--accent),#f0a500);color:#000}
.btn-primary:active{opacity:.85}
.auth-err{color:var(--danger);font-size:12px;margin-top:10px;text-align:center;font-family:var(--font2);min-height:18px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.topbar-brand{display:flex;align-items:center;gap:10px}
.topbar-title{font-size:17px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-user{font-size:11px;color:var(--sub);font-family:var(--font2)}
.btn-icon{background:none;border:none;color:var(--sub);font-size:18px;cursor:pointer;padding:6px;border-radius:8px}
.save-dot{width:7px;height:7px;border-radius:50%;background:var(--success);opacity:0;transition:.3s;display:inline-block}
.save-dot.saving{background:var(--accent);opacity:1}
.save-dot.saved{opacity:1}
.scroll{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{display:none}
.bottom-nav{display:flex;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px;cursor:pointer;border:none;background:none;color:var(--sub);font-family:var(--font);position:relative}
.nav-item .nav-icon{font-size:22px}
.nav-item .nav-label{font-size:10px;margin-top:2px}
.nav-item.active .nav-label{color:var(--accent);font-weight:700}
.nav-item.active:after{content:'';position:absolute;bottom:0;left:25%;right:25%;height:2px;background:var(--accent);border-radius:2px 2px 0 0}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:14px}
.card-title{font-size:13px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;font-family:var(--font2)}
.date-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;margin-top:4px}
.date-display{text-align:center;flex:1}
.date-main{font-size:17px;font-weight:700}
.date-sublbl{font-size:11px;color:var(--sub);font-family:var(--font2)}
.today-badge{background:var(--accent);color:#000;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:6px;vertical-align:middle}
.date-nav{background:var(--card);border:1px solid var(--border);border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;color:var(--sub)}
.mood-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.mood-btn{display:flex;flex-direction:column;align-items:center;padding:10px 4px;border-radius:12px;border:2px solid transparent;background:var(--surface);cursor:pointer;gap:4px;width:100%}
.mood-btn.sel{transform:translateY(-3px)}
.mood-emoji{font-size:28px}
.mood-lbl{font-size:10px;color:var(--sub);font-family:var(--font2);font-weight:600}
.note-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;color:var(--text);font-family:var(--font2);font-size:14px;min-height:90px;resize:none;outline:none;line-height:1.6}
.note-input:focus{border-color:var(--accent)}
.prog-info{display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px;color:var(--sub);font-family:var(--font2)}
.prog-bar{height:6px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:14px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent3),var(--accent));border-radius:4px;transition:.4s;width:0%}
.habit-row{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid var(--border);gap:10px;cursor:pointer}
.habit-row:last-child{border-bottom:none}
.hcheck{width:24px;height:24px;border-radius:7px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px}
.hcheck.done{background:var(--success);border-color:var(--success);color:#000}
.hname{flex:1;font-size:14px;font-family:var(--font2)}
.hname.done{text-decoration:line-through;color:var(--sub)}
.btn-rpt{background:none;border:none;font-size:15px;cursor:pointer;padding:4px;opacity:.4}
.btn-rpt.on{opacity:1}
.btn-del{background:none;border:none;color:var(--danger);font-size:15px;cursor:pointer;padding:4px 6px;opacity:.5}
.add-row{display:flex;gap:8px;margin-top:12px}
.add-inp{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-family:var(--font2);font-size:13px;outline:none}
.add-inp:focus{border-color:var(--accent)}
.btn-sm{padding:10px 14px;background:var(--accent);color:#000;border:none;border-radius:10px;font-family:var(--font);font-weight:700;font-size:13px;cursor:pointer}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;margin-top:4px}
.cal-month{font-size:18px;font-weight:700}
.dlabels{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.dlbl{text-align:center;font-size:11px;color:var(--sub);padding:4px 0;font-family:var(--font2);font-weight:600}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;border:2px solid transparent}
.cal-cell.today{border-color:var(--accent)}
.cal-cell.has-data{background:var(--card)}
.cal-num{font-size:12px;font-weight:600}
.cal-dot{font-size:13px}
.cal-cell.today .cal-num{color:var(--accent);font-weight:800}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.lgitem{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--sub);font-family:var(--font2)}
.lgdot{width:8px;height:8px;border-radius:50%;display:inline-block}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center}
.stat-num{font-size:28px;font-weight:800}
.stat-lbl{font-size:11px;color:var(--sub);font-family:var(--font2);margin-top:2px}
.heat-wrap{overflow-x:auto;padding-bottom:8px}
.htable{border-collapse:separate;border-spacing:3px}
.hlbl{font-size:10px;color:var(--sub);padding-right:8px;font-family:var(--font2);white-space:nowrap}
.hcell{width:26px;height:26px;border-radius:6px;background:var(--surface)}
.hcell.done{background:rgba(46,213,115,.3)}
.hdlbl{font-size:9px;color:var(--sub);text-align:center;font-family:var(--font2)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:.25s}
.modal-bg.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:24px 24px 0 0;padding:24px;padding-bottom:32px;width:100%;max-width:480px;transform:translateY(100%);transition:.3s}
.modal-bg.open .modal{transform:translateY(0)}
.mhandle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
.mtitle{font-size:15px;font-weight:700;margin-bottom:14px;text-align:center;color:var(--sub);font-family:var(--font2)}
.mmood{font-size:52px;text-align:center;margin:4px 0}
.mmood-name{text-align:center;font-size:17px;font-weight:700;margin-bottom:10px}
.mnote{background:var(--card);border-radius:10px;padding:12px;font-family:var(--font2);font-size:13px;color:var(--sub);margin-bottom:10px;line-height:1.6;white-space:pre-wrap}
.mhabits{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.htag{background:rgba(46,213,115,.15);color:var(--success);border-radius:20px;padding:4px 10px;font-size:12px;font-family:var(--font2)}
.mempty{color:var(--sub);text-align:center;padding:20px;font-family:var(--font2)}
.mclose{width:100%;padding:13px;background:var(--card2);border:none;border-radius:12px;color:var(--sub);font-family:var(--font);font-size:14px;cursor:pointer;margin-top:8px}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:10px 18px;font-size:13px;font-family:var(--font2);opacity:0;transition:.25s;pointer-events:none;z-index:200;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
</style>
</head>
<body>
<div id="app">
  <div id="auth-screen" class="screen active">
    <div class="auth-logo">🌙</div>
    <div class="auth-title">MoodBar</div>
    <div class="auth-sub">บันทึกอารมณ์และนิสัยประจำวัน</div>
    <div class="auth-card">
      <div class="auth-tabs">
        <div class="auth-tab active" id="tab-l-btn" onclick="switchAuth('login')">เข้าสู่ระบบ</div>
        <div class="auth-tab" id="tab-r-btn" onclick="switchAuth('register')">สมัครสมาชิก</div>
      </div>
      <div id="form-l">
        <div class="field"><label>อีเมล</label><input id="l-email" type="email" placeholder="your@email.com"/></div>
        <div class="field"><label>รหัสผ่าน</label><input id="l-pass" type="password" placeholder="••••••••"/></div>
        <button class="btn btn-primary" onclick="doLogin()">เข้าสู่ระบบ</button>
      </div>
      <div id="form-r" style="display:none">
        <div class="field"><label>ชื่อที่ใช้แสดง</label><input id="r-name" type="text" placeholder="ชื่อเล่นหรือชื่อที่อยากใช้"/></div>
        <div class="field"><label>อีเมล</label><input id="r-email" type="email" placeholder="your@email.com"/></div>
        <div class="field"><label>รหัสผ่าน</label><input id="r-pass" type="password" placeholder="อย่างน้อย 6 ตัว"/></div>
        <button class="btn btn-primary" onclick="doRegister()">สมัครสมาชิก</button>
      </div>
      <div class="auth-err" id="auth-err"></div>
    </div>
  </div>

  <div id="main-screen" class="screen">
    <div class="topbar">
      <div class="topbar-brand">
        <span style="font-size:20px">🌙</span>
        <div><div class="topbar-title">MoodBar</div><div class="topbar-user" id="t-user"></div></div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="save-dot" id="sdot"></span>
        <button class="btn-icon" onclick="doLogout()">⏻</button>
      </div>
    </div>

    <div id="t-home" class="scroll" style="display:flex;flex-direction:column">
      <div class="date-bar">
        <button class="date-nav" onclick="changeDay(-1)">&#8249;</button>
        <div class="date-display">
          <div class="date-main" id="d-main"></div>
          <div class="date-sublbl" id="d-sub"></div>
        </div>
        <button class="date-nav" onclick="changeDay(1)">&#8250;</button>
      </div>
      <div class="card">
        <div class="card-title">อารมณ์วันนี้</div>
        <div class="mood-grid" id="mood-grid"></div>
      </div>
      <div class="card">
        <div class="card-title">&#128221; บันทึก</div>
        <textarea class="note-input" id="note-inp" placeholder="เขียนสิ่งที่เกิดขึ้น ความรู้สึก..." rows="4"></textarea>
      </div>
      <div class="card" style="margin-bottom:20px">
        <div class="card-title">&#9989; นิสัยประจำวัน</div>
        <div class="prog-info"><span id="h-prog">0/0</span><span id="h-pct">0%</span></div>
        <div class="prog-bar"><div class="prog-fill" id="p-fill"></div></div>
        <div id="h-list"></div>
        <div class="add-row">
          <input class="add-inp" id="new-h" placeholder="เพิ่มนิสัยใหม่..." maxlength="40"/>
          <button class="btn-sm" onclick="addHabit()">+ เพิ่ม</button>
        </div>
      </div>
    </div>

    <div id="t-cal" class="scroll" style="display:none;flex-direction:column">
      <div class="cal-nav">
        <button class="date-nav" onclick="changeCalMonth(-1)">&#8249;</button>
        <span class="cal-month" id="cal-m"></span>
        <button class="date-nav" onclick="changeCalMonth(1)">&#8250;</button>
      </div>
      <div class="dlabels">
        <div class="dlbl">อา</div><div class="dlbl">จ</div><div class="dlbl">อ</div>
        <div class="dlbl">พ</div><div class="dlbl">พฤ</div><div class="dlbl">ศ</div><div class="dlbl">ส</div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div class="card" style="margin-top:14px;margin-bottom:20px">
        <div class="card-title">สีอารมณ์</div>
        <div class="legend" id="legend"></div>
      </div>
    </div>

    <div id="t-stat" class="scroll" style="display:none;flex-direction:column">
      <div class="stat-grid" style="margin-top:4px">
        <div class="stat-card"><div class="stat-num" id="ss" style="color:var(--accent)">0</div><div class="stat-lbl">Streak &#128293;</div></div>
        <div class="stat-card"><div class="stat-num" id="st" style="color:var(--accent2)">0</div><div class="stat-lbl">วันที่บันทึก</div></div>
        <div class="stat-card"><div class="stat-num" id="sr" style="color:var(--accent3)">0%</div><div class="stat-lbl">อัตรา Habit</div></div>
        <div class="stat-card"><div class="stat-num" id="sm" style="color:var(--accent)">-</div><div class="stat-lbl">อารมณ์เฉลี่ย</div></div>
      </div>
      <div class="card">
        <div class="card-title">&#128202; Habit 14 วันล่าสุด</div>
        <div class="heat-wrap"><table class="htable" id="htable"></table></div>
      </div>
      <div class="card" style="margin-bottom:20px">
        <div class="card-title">&#128578; อารมณ์ 7 วัน</div>
        <div id="mchart" style="display:flex;align-items:flex-end;gap:6px;height:80px"></div>
      </div>
    </div>

    <div class="bottom-nav">
      <button class="nav-item active" id="n-home" onclick="switchTab('home')">
        <span class="nav-icon">&#127968;</span><span class="nav-label">หน้าหลัก</span>
      </button>
      <button class="nav-item" id="n-cal" onclick="switchTab('cal')">
        <span class="nav-icon">&#128197;</span><span class="nav-label">ปฏิทิน</span>
      </button>
      <button class="nav-item" id="n-stat" onclick="switchTab('stat')">
        <span class="nav-icon">&#128202;</span><span class="nav-label">สถิติ</span>
      </button>
    </div>
  </div>
</div>

<div class="modal-bg" id="day-modal" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="mhandle"></div>
    <div class="mtitle" id="m-date"></div>
    <div id="m-body"></div>
    <button class="mclose" onclick="closeModal()">ปิด</button>
  </div>
</div>
<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
var firebaseConfig = {
  apiKey: "AIzaSyBuxR4sSzJtmruHlBLn79ax40WPMdB2HLM",
  authDomain: "todoyus.firebaseapp.com",
  databaseURL: "https://todoyus-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "todoyus",
  storageBucket: "todoyus.firebasestorage.app",
  messagingSenderId: "481521866114",
  appId: "1:481521866114:web:04f5e1dad14a1069c2eb9b"
};
firebase.initializeApp(firebaseConfig);
var auth = firebase.auth();
var db = firebase.database();

var MOODS = [
  {id:1,emoji:"😄",label:"ดีมาก",color:"#FFD93D"},
  {id:2,emoji:"🙂",label:"ดี",color:"#6BCB77"},
  {id:3,emoji:"😐",label:"ปกติ",color:"#4D96FF"},
  {id:4,emoji:"😔",label:"แย่",color:"#FF6B6B"},
  {id:5,emoji:"😞",label:"แย่มาก",color:"#C77DFF"}
];
var DAY_TH = ["อาทิตย์","จันทร์","อังคาร","พุธ","พฤหัสบดี","ศุกร์","เสาร์"];
var DAY_S = ["อา","จ","อ","พ","พฤ","ศ","ส"];
var MON_TH = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
var MON_S = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];

var uid = null, userLogs = {}, userHabits = [];
var activeDay = todayKey(), calDate = new Date();
var saveTimer = null, noteTimer = null, toastTimer = null;

function pad(n) { return n < 10 ? "0"+n : ""+n; }
function dateKey(d) { return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function todayKey() { return dateKey(new Date()); }
function parseKey(k) { var p=k.split("-"); return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2])); }
function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function switchAuth(m) {
  if (m === "login") {
    document.getElementById("tab-l-btn").className = "auth-tab active";
    document.getElementById("tab-r-btn").className = "auth-tab";
    document.getElementById("form-l").style.display = "block";
    document.getElementById("form-r").style.display = "none";
  } else {
    document.getElementById("tab-l-btn").className = "auth-tab";
    document.getElementById("tab-r-btn").className = "auth-tab active";
    document.getElementById("form-l").style.display = "none";
    document.getElementById("form-r").style.display = "block";
  }
  document.getElementById("auth-err").textContent = "";
}

function doLogin() {
  var e = document.getElementById("l-email").value.trim();
  var p = document.getElementById("l-pass").value;
  document.getElementById("auth-err").textContent = "";
  auth.signInWithEmailAndPassword(e, p).catch(function(err) {
    document.getElementById("auth-err").textContent = thErr(err.code);
  });
}

function doRegister() {
  var name = document.getElementById("r-name").value.trim();
  var e = document.getElementById("r-email").value.trim();
  var p = document.getElementById("r-pass").value;
  document.getElementById("auth-err").textContent = "";
  if (!name) { document.getElementById("auth-err").textContent = "กรุณาใส่ชื่อ"; return; }
  auth.createUserWithEmailAndPassword(e, p).then(function(cred) {
    return cred.user.updateProfile({displayName: name}).then(function() {
      return db.ref("users/"+cred.user.uid+"/habits").set(["ออกกำลังกาย","อ่านหนังสือ","ดื่มน้ำ 8 แก้ว","นอนก่อน 23:00"]);
    });
  }).catch(function(err) {
    document.getElementById("auth-err").textContent = thErr(err.code);
  });
}

function doLogout() { auth.signOut(); }

function thErr(c) {
  if (c==="auth/user-not-found"||c==="auth/invalid-credential"||c==="auth/wrong-password") return "อีเมลหรือรหัสผ่านไม่ถูกต้อง";
  if (c==="auth/email-already-in-use") return "อีเมลนี้ถูกใช้แล้ว";
  if (c==="auth/weak-password") return "รหัสผ่านต้องอย่างน้อย 6 ตัว";
  if (c==="auth/invalid-email") return "รูปแบบอีเมลไม่ถูกต้อง";
  return "เกิดข้อผิดพลาด";
}

auth.onAuthStateChanged(function(user) {
  if (user) {
    uid = user.uid;
    document.getElementById("t-user").textContent = user.displayName || user.email;
    document.getElementById("auth-screen").className = "screen";
    document.getElementById("main-screen").className = "screen active";
    loadData();
  } else {
    uid = null; userLogs = {}; userHabits = [];
    document.getElementById("main-screen").className = "screen";
    document.getElementById("auth-screen").className = "screen active";
  }
});

function loadData() {
  db.ref("users/"+uid).on("value", function(snap) {
    var data = snap.val() || {};
    userLogs = data.logs || {};
    userHabits = data.habits || [];
    renderAll();
  });
}

function saveData() {
  var dot = document.getElementById("sdot");
  dot.className = "save-dot saving";
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function() {
    db.ref("users/"+uid).set({logs: userLogs, habits: userHabits}).then(function() {
      dot.className = "save-dot saved";
      setTimeout(function() { dot.className = "save-dot"; }, 2000);
    });
  }, 700);
}

function getLog(k) { return userLogs[k] || {mood:null,note:"",habits:{}}; }

function setLog(k, patch) {
  var c = getLog(k), m = {};
  for (var x in c) m[x] = c[x];
  for (var x in patch) m[x] = patch[x];
  userLogs[k] = m;
  saveData();
}

function renderAll() {
  renderDateBar(); renderMoodGrid(); renderNoteInput(); renderHabitList();
  if (document.getElementById("t-cal").style.display !== "none") renderCalendar();
  if (document.getElementById("t-stat").style.display !== "none") renderStats();
}

function renderDateBar() {
  var d = parseKey(activeDay), isToday = activeDay === todayKey();
  var badge = isToday ? ' <span class="today-badge">วันนี้</span>' : "";
  document.getElementById("d-main").innerHTML = d.getDate()+" "+MON_S[d.getMonth()]+" "+(d.getFullYear()+543)+badge;
  document.getElementById("d-sub").textContent = DAY_TH[d.getDay()];
}

function changeDay(n) {
  var d = parseKey(activeDay); d.setDate(d.getDate()+n);
  activeDay = dateKey(d); renderAll();
}

function renderMoodGrid() {
  var log = getLog(activeDay), html = "";
  for (var i = 0; i < MOODS.length; i++) {
    var m = MOODS[i], sel = log.mood && log.mood.id === m.id;
    var st = sel ? "border-color:"+m.color+";background:"+m.color+"18" : "";
    html += '<button class="mood-btn'+(sel?" sel":"")+ '" style="'+st+'" onclick="selMood('+m.id+')">';
    html += '<span class="mood-emoji">'+m.emoji+'</span>';
    html += '<span class="mood-lbl" style="'+(sel?"color:"+m.color:"")+'">'+ m.label+'</span></button>';
  }
  document.getElementById("mood-grid").innerHTML = html;
}

function selMood(id) {
  var m = null;
  for (var i = 0; i < MOODS.length; i++) { if (MOODS[i].id === id) { m = MOODS[i]; break; } }
  setLog(activeDay, {mood: m}); renderMoodGrid();
}

function renderNoteInput() {
  var inp = document.getElementById("note-inp");
  if (document.activeElement !== inp) inp.value = getLog(activeDay).note || "";
}

document.getElementById("note-inp").addEventListener("input", function() {
  var v = this.value;
  clearTimeout(noteTimer);
  noteTimer = setTimeout(function() { setLog(activeDay, {note: v}); }, 500);
});

function renderHabitList() {
  var log = getLog(activeDay), done = 0;
  for (var i = 0; i < userHabits.length; i++) { if (log.habits && log.habits[userHabits[i]]) done++; }
  var total = userHabits.length, pct = total ? Math.round(done/total*100) : 0;
  document.getElementById("h-prog").textContent = done+"/"+total+" เสร็จแล้ว";
  document.getElementById("h-pct").textContent = pct+"%";
  document.getElementById("p-fill").style.width = pct+"%";
  var html = "";
  for (var i = 0; i < userHabits.length; i++) {
    var h = userHabits[i];
    var isDone = !!(log.habits && log.habits[h]);
    var isRpt = !!(log.habits && log.habits["_r_"+h]);
    var hE = esc(h).replace(/'/g,"&#39;");
    html += '<div class="habit-row" onclick="togH(\''+hE+'\')"><div class="hcheck'+(isDone?" done":"")+'">'+( isDone?"✓":"")+'</div>';
    html += '<span class="hname'+(isDone?" done":"")+'">'+esc(h)+'</span>';
    html += '<button class="btn-rpt'+(isRpt?" on":"")+'" onclick="event.stopPropagation();togRpt(\''+hE+'\')">🔁</button>';
    html += '<button class="btn-del" onclick="event.stopPropagation();delH('+i+')">✕</button></div>';
  }
  document.getElementById("h-list").innerHTML = html;
}

function togH(h) {
  var log = getLog(activeDay), habits = {};
  if (log.habits) { for (var k in log.habits) habits[k] = log.habits[k]; }
  habits[h] = !habits[h];
  if (habits["_r_"+h]) {
    for (var key in userLogs) {
      if (key !== activeDay) {
        var dl = getLog(key), dh = {};
        if (dl.habits) { for (var k in dl.habits) dh[k] = dl.habits[k]; }
        dh[h] = habits[h];
        userLogs[key] = {mood:dl.mood, note:dl.note, habits:dh};
      }
    }
  }
  setLog(activeDay, {habits: habits}); renderHabitList();
}

function togRpt(h) {
  var log = getLog(activeDay), habits = {};
  if (log.habits) { for (var k in log.habits) habits[k] = log.habits[k]; }
  var rk = "_r_"+h; habits[rk] = !habits[rk];
  setLog(activeDay, {habits: habits}); renderHabitList();
  showToast(habits[rk] ? "🔁 จะติ๊กทุกวัน" : "⏹ ยกเลิกทำซ้ำ");
}

function addHabit() {
  var inp = document.getElementById("new-h"), v = inp.value.trim();
  if (!v) return;
  for (var i = 0; i < userHabits.length; i++) { if (userHabits[i] === v) return; }
  userHabits.push(v); inp.value = ""; saveData(); renderHabitList();
}

function delH(i) { userHabits.splice(i,1); saveData(); renderHabitList(); }

document.getElementById("new-h").addEventListener("keydown", function(e) { if (e.key === "Enter") addHabit(); });

function renderCalendar() {
  var y = calDate.getFullYear(), mo = calDate.getMonth();
  document.getElementById("cal-m").textContent = MON_TH[mo]+" "+(y+543);
  var fd = new Date(y,mo,1).getDay(), days = new Date(y,mo+1,0).getDate(), tday = todayKey(), html = "";
  for (var i = 0; i < fd; i++) html += "<div></div>";
  for (var d = 1; d <= days; d++) {
    var k = y+"-"+pad(mo+1)+"-"+pad(d), log = userLogs[k], mood = log && log.mood;
    var cls = "cal-cell"+(k===tday?" today":"")+(log?" has-data":"");
    var bg = mood ? "background:"+mood.color+"20" : "";
    html += '<div class="'+cls+'" style="'+bg+'" onclick="openModal(\''+k+'\')"><span class="cal-num">'+d+'</span>';
    if (mood) html += '<span class="cal-dot">'+mood.emoji+'</span>';
    html += '</div>';
  }
  document.getElementById("cal-grid").innerHTML = html;
  var lh = "";
  for (var i = 0; i < MOODS.length; i++) {
    lh += '<div class="lgitem"><span class="lgdot" style="background:'+MOODS[i].color+'"></span>'+MOODS[i].emoji+' '+MOODS[i].label+'</div>';
  }
  document.getElementById("legend").innerHTML = lh;
}

function changeCalMonth(n) { calDate = new Date(calDate.getFullYear(),calDate.getMonth()+n,1); renderCalendar(); }

function renderStats() {
  var keys = Object.keys(userLogs), total = 0;
  for (var i = 0; i < keys.length; i++) { if (userLogs[keys[i]] && userLogs[keys[i]].mood) total++; }
  document.getElementById("st").textContent = total;
  var streak = 0, d = new Date();
  while (true) { var k = dateKey(d); if (userLogs[k] && userLogs[k].mood) { streak++; d.setDate(d.getDate()-1); } else break; }
  document.getElementById("ss").textContent = streak;
  var hd = 0, ht = 0;
  for (var i = 0; i < 7; i++) {
    var dd = new Date(); dd.setDate(dd.getDate()-i);
    var log = getLog(dateKey(dd));
    for (var j = 0; j < userHabits.length; j++) { ht++; if (log.habits && log.habits[userHabits[j]]) hd++; }
  }
  document.getElementById("sr").textContent = ht ? Math.round(hd/ht*100)+"%" : "0%";
  var mv = [];
  for (var i = 0; i < 7; i++) {
    var dd = new Date(); dd.setDate(dd.getDate()-i);
    var log = getLog(dateKey(dd)); if (log.mood) mv.push(log.mood.id);
  }
  var avg = null;
  if (mv.length) { var s=0; for(var i=0;i<mv.length;i++) s+=mv[i]; var aid=Math.round(s/mv.length); for(var i=0;i<MOODS.length;i++){if(MOODS[i].id===aid){avg=MOODS[i];break;}} }
  document.getElementById("sm").textContent = avg ? avg.emoji : "-";
  var d14 = [];
  for (var i=13;i>=0;i--) { var dd=new Date(); dd.setDate(dd.getDate()-i); d14.push({key:dateKey(dd),date:dd}); }
  var th = "";
  for (var j=0;j<userHabits.length;j++) {
    var h=userHabits[j], lbl=h.length>8?h.slice(0,8)+"…":h;
    th += "<tr><td class='hlbl'>"+esc(lbl)+"</td>";
    for (var i=0;i<d14.length;i++) { var hl=getLog(d14[i].key),dn=hl.habits&&hl.habits[h]; th+="<td class='hcell"+(dn?" done":"")+"'></td>"; }
    th += "</tr><tr><td></td>";
    for (var i=0;i<d14.length;i++) { if(i===0||i===6||i===13) th+="<td class='hdlbl'>"+d14[i].date.getDate()+"</td>"; else th+="<td></td>"; }
    th += "</tr>";
  }
  document.getElementById("htable").innerHTML = th;
  var d7=[];
  for (var i=6;i>=0;i--) { var dd=new Date();dd.setDate(dd.getDate()-i);d7.push({key:dateKey(dd),date:dd}); }
  var ch="";
  for (var i=0;i<d7.length;i++) {
    var log=getLog(d7[i].key),m=log.mood,h=m?(6-m.id)*16+8:4,bg=m?m.color+"60":"var(--border)";
    ch+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">';
    ch+='<div style="font-size:'+(m?"16":"10")+'px;opacity:'+(m?"1":".3")+'">'+(m?m.emoji:"·")+'</div>';
    ch+='<div style="width:100%;height:'+h+'px;background:'+bg+';border-radius:4px"></div>';
    ch+='<div style="font-size:9px;color:var(--sub)">'+DAY_S[d7[i].date.getDay()]+'</div></div>';
  }
  document.getElementById("mchart").innerHTML = ch;
}

function openModal(key) {
  var log = userLogs[key], d = parseKey(key);
  document.getElementById("m-date").textContent = d.getDate()+" "+MON_TH[d.getMonth()]+" "+(d.getFullYear()+543);
  var html = "";
  if (!log || (!log.mood && !log.note)) {
    html = '<div class="mempty">ยังไม่มีข้อมูลวันนี้</div>';
  } else {
    if (log.mood) html += '<div class="mmood">'+log.mood.emoji+'</div><div class="mmood-name" style="color:'+log.mood.color+'">'+log.mood.label+'</div>';
    if (log.note) html += '<div class="mnote">'+esc(log.note)+'</div>';
    var dh = [];
    for (var i=0;i<userHabits.length;i++) { if (log.habits && log.habits[userHabits[i]]) dh.push(userHabits[i]); }
    if (dh.length) {
      html += '<div style="font-size:12px;color:var(--sub);margin-bottom:6px;font-family:var(--font2)">นิสัยที่ทำสำเร็จ</div><div class="mhabits">';
      for (var i=0;i<dh.length;i++) html += '<span class="htag">✅ '+esc(dh[i])+'</span>';
      html += '</div>';
    }
  }
  document.getElementById("m-body").innerHTML = html;
  document.getElementById("day-modal").className = "modal-bg open";
}

function closeModal() { document.getElementById("day-modal").className = "modal-bg"; }

function switchTab(name) {
  var tabs = ["home","cal","stat"];
  for (var i=0;i<tabs.length;i++) {
    var el = document.getElementById("t-"+tabs[i]);
    el.style.display = tabs[i]===name ? "flex" : "none";
    document.getElementById("n-"+tabs[i]).className = "nav-item"+(tabs[i]===name?" active":"");
  }
  if (name==="cal") renderCalendar();
  if (name==="stat") renderStats();
}

function showToast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg; t.className = "show";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.className = ""; }, 2500);
}
</script>
</body>
</html>
